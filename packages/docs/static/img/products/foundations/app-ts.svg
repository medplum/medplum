<svg xmlns="http://www.w3.org/2000/svg" width="407" height="205" viewBox="0 0 407 205" role="img" aria-label="app.ts code sample"><text xml:space="preserve" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,&apos;Liberation Mono&apos;,&apos;Courier New&apos;,monospace" font-size="10.5" fill="rgba(255,255,255,0.85)"><tspan x="16" y="25.8"><tspan fill="#c4b5fd">import</tspan> { <tspan fill="#67e8f9">MedplumClient</tspan> } <tspan fill="#c4b5fd">from</tspan> <tspan fill="#86efac">'@medplum/core'</tspan>;</tspan><tspan x="16" dy="16.8"></tspan><tspan x="16" dy="16.8"><tspan fill="#c4b5fd">const</tspan> medplum = <tspan fill="#c4b5fd">new</tspan> <tspan fill="#93c5fd">MedplumClient</tspan>();</tspan><tspan x="16" dy="16.8"></tspan><tspan x="16" dy="16.8"><tspan fill="rgba(255,255,255,0.4)" font-style="italic">// Typed reads, searches, and writes</tspan></tspan><tspan x="16" dy="16.8"><tspan fill="#c4b5fd">const</tspan> patient = <tspan fill="#c4b5fd">await</tspan> medplum.<tspan fill="#93c5fd">readResource</tspan>(<tspan fill="#86efac">'Patient'</tspan>, id);</tspan><tspan x="16" dy="16.8"></tspan><tspan x="16" dy="16.8"><tspan fill="#c4b5fd">const</tspan> vitals = <tspan fill="#c4b5fd">await</tspan> medplum.<tspan fill="#93c5fd">searchResources</tspan>(</tspan><tspan x="16" dy="16.8">  <tspan fill="#86efac">'Observation'</tspan>,</tspan><tspan x="16" dy="16.8">  { subject: <tspan fill="#86efac">`Patient/${id}`</tspan> }</tspan><tspan x="16" dy="16.8">);</tspan></text></svg>
