<svg xmlns="http://www.w3.org/2000/svg" width="330" height="172" viewBox="0 0 330 172" role="img" aria-label="auth.ts code sample"><text xml:space="preserve" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,&apos;Liberation Mono&apos;,&apos;Courier New&apos;,monospace" font-size="10.5" fill="rgba(255,255,255,0.85)"><tspan x="16" y="25.8"><tspan fill="#c4b5fd">import</tspan> { <tspan fill="#67e8f9">MedplumClient</tspan> } <tspan fill="#c4b5fd">from</tspan> <tspan fill="#86efac">'@medplum/core'</tspan>;</tspan><tspan x="16" dy="16.8"></tspan><tspan x="16" dy="16.8"><tspan fill="#c4b5fd">const</tspan> medplum = <tspan fill="#c4b5fd">new</tspan> <tspan fill="#93c5fd">MedplumClient</tspan>();</tspan><tspan x="16" dy="16.8"></tspan><tspan x="16" dy="16.8"><tspan fill="rgba(255,255,255,0.4)" font-style="italic">// Route through Medplum or your own IdP</tspan></tspan><tspan x="16" dy="16.8"><tspan fill="#c4b5fd">await</tspan> medplum.<tspan fill="#93c5fd">signInWithRedirect</tspan>({</tspan><tspan x="16" dy="16.8">  clientId: <tspan fill="#86efac">'my-app'</tspan>,</tspan><tspan x="16" dy="16.8">  scope: <tspan fill="#86efac">'openid profile'</tspan>,</tspan><tspan x="16" dy="16.8">});</tspan></text></svg>
