<svg xmlns="http://www.w3.org/2000/svg" width="394" height="222" viewBox="0 0 394 222" role="img" aria-label="welcome-bot.ts code sample"><text xml:space="preserve" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,&apos;Liberation Mono&apos;,&apos;Courier New&apos;,monospace" font-size="10.5" fill="rgba(255,255,255,0.85)"><tspan x="16" y="25.8"><tspan fill="#c4b5fd">import</tspan> { <tspan fill="#67e8f9">BotEvent</tspan>, <tspan fill="#67e8f9">MedplumClient</tspan> } <tspan fill="#c4b5fd">from</tspan> <tspan fill="#86efac">'@medplum/core'</tspan>;</tspan><tspan x="16" dy="16.8"></tspan><tspan x="16" dy="16.8"><tspan fill="#c4b5fd">export async function</tspan> <tspan fill="#93c5fd">handler</tspan>(</tspan><tspan x="16" dy="16.8">  medplum: <tspan fill="#67e8f9">MedplumClient</tspan>,</tspan><tspan x="16" dy="16.8">  event: <tspan fill="#67e8f9">BotEvent</tspan>&lt;<tspan fill="#67e8f9">Patient</tspan>&gt;</tspan><tspan x="16" dy="16.8">) {</tspan><tspan x="16" dy="16.8">  <tspan fill="#c4b5fd">const</tspan> patient = event.input;</tspan><tspan x="16" dy="16.8">  <tspan fill="#c4b5fd">await</tspan> medplum.<tspan fill="#93c5fd">createResource</tspan>({</tspan><tspan x="16" dy="16.8">    resourceType: <tspan fill="#86efac">'Communication'</tspan>,</tspan><tspan x="16" dy="16.8">    status: <tspan fill="#86efac">'completed'</tspan>,</tspan><tspan x="16" dy="16.8">  });</tspan><tspan x="16" dy="16.8">}</tspan></text></svg>
