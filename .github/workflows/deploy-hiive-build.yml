name: Deploy Hiive Build

concurrency:
  group: hiive-build-cdk
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      action:
        description: CDK action to run for the hiive-build environment
        required: true
        default: diff
        type: choice
        options:
          - synth
          - diff
          - deploy

permissions:
  contents: read

jobs:
  deploy:
    name: Run Hiive Build CDK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    env:
      NODE_VERSION: '22'
      AWS_REGION: us-east-1
      CDK_CONFIG_FILE: medplum.build.config.json

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Cache npm
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-
      - name: Install dependencies
        run: npm ci
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 # v6.1.2
        with:
          role-to-assume: ${{ secrets.HIIVE_BUILD_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Run CDK action
        run: bash ./scripts/deploy-hiive-build-cdk.sh "${{ inputs.action }}"
      - name: Describe deployed stack
        if: ${{ inputs.action == 'deploy' }}
        run: bash ./scripts/deploy-hiive-build-cdk.sh describe