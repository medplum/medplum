name: Prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (leave blank for automatic)'
        type: string
      is_latest:
        description: 'Tag this release as the latest (default: true)'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.MEDPLUM_BOT_GITHUB_ACCESS_TOKEN }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          # After v6, the default for `package-manager-cache` is true. We however, have historically used caching with a fallback which is not supported by the setup-node action
          # See: https://github.com/actions/setup-node/issues/328
          package-manager-cache: false

      # npm 11.6.2 is currently bundled with Node v24 and has an irksome bug affecting
      # `peer` attributes in the lockfile (https://github.com/npm/cli/issues/8690).
      # Upgrade to a patched version; this should be removed after Node has a tagged
      # release incorporating npm@11.6.3 or later.
      - name: Upgrade NPM
        run: npm install --global npm@11.7.0
      - name: Setup git
        run: |
          git config --global user.email "${{ secrets.MEDPLUM_BOT_EMAIL }}"
          git config --global user.name "${{ secrets.MEDPLUM_BOT_NAME }}"
      - name: Prepare release
        run: ./scripts/prepare-release.sh ${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.MEDPLUM_BOT_GITHUB_ACCESS_TOKEN }}
          IS_LATEST: ${{ inputs.is_latest }}
