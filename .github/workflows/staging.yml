name: Staging

concurrency:
  group: ci-staging-${{ github.sha }}
  cancel-in-progress: false

on: workflow_dispatch

permissions:
  contents: read

jobs:
  build:
    name: Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: 'remote:rw'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          # After v6, the default for `package-manager-cache` is true. We however, have historically used caching with a fallback which is not supported by the setup-node action
          # See: https://github.com/actions/setup-node/issues/328
          package-manager-cache: false
      - name: Cache node modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:fast -- --force
        env:
          MEDPLUM_BASE_URL: '__MEDPLUM_BASE_URL__'
          MEDPLUM_CLIENT_ID: '__MEDPLUM_CLIENT_ID__'
          MEDPLUM_REGISTER_ENABLED: '__MEDPLUM_REGISTER_ENABLED__'
          MEDPLUM_AWS_TEXTRACT_ENABLED: '__MEDPLUM_AWS_TEXTRACT_ENABLED__'
          GOOGLE_CLIENT_ID: '__GOOGLE_CLIENT_ID__'
          RECAPTCHA_SITE_KEY: '__RECAPTCHA_SITE_KEY__'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.STAGING_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.STAGING_AWS_REGION }}
      - name: Build GraphiQL
        run: npm run build -- --force --filter=@medplum/graphiql
        env:
          MEDPLUM_BASE_URL: ${{ secrets.STAGING_MEDPLUM_BASE_URL }}
          MEDPLUM_INTROSPECTION_URL: https://graphiql.staging.medplum.dev/schema/schema-latest.json
          GOOGLE_CLIENT_ID: ${{ secrets.STAGING_GOOGLE_CLIENT_ID }}

      - name: Deploy GraphiQL
        run: ./scripts/deploy-graphiql.sh
        env:
          GRAPHIQL_BUCKET: graphiql.staging.medplum.dev
          GRAPHIQL_AWS_REGION: us-west-2

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.STAGING_DOCKERHUB_USERNAME }}
          password: ${{ secrets.STAGING_DOCKERHUB_TOKEN }}
      - name: Login to Docker Hub Hardened Images
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: dhi.io
          username: ${{ secrets.STAGING_DOCKERHUB_USERNAME }}
          password: ${{ secrets.STAGING_DOCKERHUB_TOKEN }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build App Docker Image
        run: ./scripts/build-docker-app.sh --latest
        env:
          APP_DOCKERHUB_REPOSITORY: ${{ secrets.STAGING_APP_DOCKERHUB_REPOSITORY }}

      - name: Deploy App
        run: ./scripts/deploy-app.sh
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
          MEDPLUM_BASE_URL: ${{ secrets.STAGING_MEDPLUM_BASE_URL }}
          MEDPLUM_AWS_TEXTRACT_ENABLED: 'true'
          RECAPTCHA_SITE_KEY: ${{ secrets.STAGING_RECAPTCHA_SITE_KEY }}
          APP_BUCKET: ${{ secrets.STAGING_APP_BUCKET }}
          AWS_REGION: ${{ secrets.STAGING_AWS_REGION }}

      - name: Build Server Docker Image
        run: ./scripts/build-docker-server.sh --latest
        env:
          SERVER_DOCKERHUB_REPOSITORY: ${{ secrets.STAGING_DOCKERHUB_REPOSITORY }}

      - name: Deploy Server
        run: ./scripts/deploy-server.sh
        env:
          SERVER_DOCKERHUB_REPOSITORY: ${{ secrets.STAGING_DOCKERHUB_REPOSITORY }}
          ECS_CLUSTER: ${{ secrets.STAGING_ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.STAGING_ECS_SERVICE }}
          WORKER_ECS_CLUSTER: ${{ secrets.STAGING_WORKER_ECS_CLUSTER }}
          WORKER_ECS_SERVICE: ${{ secrets.STAGING_WORKER_ECS_SERVICE }}

      - name: Deploy bot layer
        run: ./scripts/deploy-bot-layer.sh
        env:
          AWS_REGION: ${{ secrets.STAGING_AWS_REGION }}
