name: Assign pull request

on:
  pull_request_target:
    types: [opened, ready_for_review]

permissions:
  contents: read

jobs:
  assign-pull-request:
    name: Assign pull request
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: kentaro-m/auto-assign-action@0a2c53d3721e4c5cfcce6afd4014aecc337979f6 # v2.0.2
