# MEDrecord Agent Configuration
# Extends base @mrd/agents definitions with brand-specific customizations

extends: "@mrd/agents"

brand: medrecord
name: "MEDrecord"
description: "Healthcare records management platform"

# Brand-specific agent settings
settings:
  language: en
  region: eu
  timezone: Europe/Amsterdam

# Enable all base compliance rules
compliance:
  enabled: true
  
# Enable all base instincts
instincts:
  enabled: true

# Brand-specific skills (extend base)
skills:
  enabled: true
  additional:
    - records-management
    - data-export
    - interoperability

# Standards compliance
standards:
  enabled: true
