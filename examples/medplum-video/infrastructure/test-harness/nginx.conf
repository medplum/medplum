# Test-harness SPA — served at tele.<domain> behind an HTTPS ALB.
# TLS is terminated at the ALB so nginx only needs to speak HTTP on :80.

server {
    listen       80;
    server_name  _;

    root         /usr/share/nginx/html;
    index        index.html;

    # Never cache the HTML shell or the runtime-templated config.
    # Hashed asset files under /assets/ get long-lived caching instead.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/javascript";
    }

    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ALB target-group health check.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # SPA fallback – every unknown path serves index.html so react-router
    # can take over client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # A few hardening headers (TLS / HSTS come from the ALB).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
}
