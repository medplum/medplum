# Default values for medplum.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  cloudProvider: aws # Supported values: gcp, azure, aws
  configSource:
    # Examples:
    # type: "env"
    # type: "aws:region:parameterName"
    # type: "gcp:projectId:secretId"
    # type: "azure:keyVaultURL:secretName"
    type: 'env' # Default to env

serviceAccount:
  annotations:
    # AWS: annotate with the server_iam_role_arn Terraform output to enable IRSA
    # eks.amazonaws.com/role-arn: ""
    # Set your Google Cloud Platform service account (e.g., medplum-server@[MY_PROJECT_ID].iam.gserviceaccount.com)
    # iam.gke.io/gcp-service-account: ""
    # Set your Azure Managed Identity Client ID for Azure workload identity
    # azure.workload.identity/client-id: ""

namespace: medplum

deployment:
  replicaCount: 1
  image:
    repository: medplum/medplum-server
    tag: latest
  env:
    # - name: SQL_DEBUG
    #   value: '*'
  resources:
    requests:
      memory: '1Gi'
      cpu: '500m'
    limits:
      memory: '2Gi'
      cpu: '1000m'
  autoscaling:
    enabled: true
  # Structure this deployment.sidecar value as if you were adding the container
  # to the Deployment's spec.template.spec.containers key.
  sidecars: []

# Security contexts for pods and containers
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Pod Disruption Budget settings
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # Alternative: maxUnavailable: 1

service: {}

ingress:
  deploy: true
  # Set your domain name (e.g., medplum.example.com)
  domain: ''
  # Set your TLS secret name (Azure only)
  tlsSecretName: ''
  # AWS only: ACM certificate ARN for the ALB HTTPS listener
  acmCertificateArn: ''
  # AWS only: ARN of the regional WAFv2 Web ACL to attach to the LB Controller-managed ALB.
  # Set to the value of `terraform output api_waf_arn`.
  # The LB Controller associates the WAF with the ALB it creates via the
  # alb.ingress.kubernetes.io/wafv2-acl-arn annotation.
  wafAclArn: ''

# DNS management via external-dns (AWS only).
# When enabled, installs external-dns as a sub-chart and creates Route 53 records
# for the ALB (via Ingress annotation), CloudFront distributions, and SES verification.
#
# Populate dns.* values from terraform outputs:
#   dns.cloudFrontDomain   ← terraform output cdn_domain_name
#   dns.storageCdnDomain   ← terraform output storage_cdn_domain_name
#   dns.sesVerificationToken ← terraform output ses_verification_token
#   dns.sesDkimTokens      ← terraform output ses_dkim_tokens
#   dns.iamRoleArn         ← terraform output external_dns_iam_role_arn
dns:
  enabled: false
  provider: aws
  # Route 53 hosted zone ID that external-dns will manage records in
  zoneId: ''
  # IRSA role ARN for external-dns (external_dns_iam_role_arn terraform output).
  # Used when installing external-dns standalone — see charts/README.md.
  iamRoleArn: ''
  # App domain — must match ingress.domain
  appDomain: ''
  # Raw CloudFront distribution domain (cdn_domain_name terraform output)
  cloudFrontDomain: ''
  # Storage CDN domain (storage_domain terraform variable) — leave empty when storage CDN is disabled
  storageDomain: ''
  # Raw storage CloudFront distribution domain (storage_cdn_domain_name terraform output)
  storageCdnDomain: ''
  # SES domain verification token (ses_verification_token terraform output)
  sesVerificationToken: ''
  # SES DKIM tokens — list of 3 strings (ses_dkim_tokens terraform output)
  sesDkimTokens: []
