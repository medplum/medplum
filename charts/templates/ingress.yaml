{{- if and (eq .Values.global.cloudProvider "gcp") (eq .Values.ingress.deploy true) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "medplum.fullname" . }}
  namespace: {{ include "medplum.namespace" . }}
  labels:
    {{- include "medplum.labels" . | nindent 4 }}
  annotations:
    ingressClassName: "gce"
    kubernetes.io/ingress.global-static-ip-name: medplum-external-ip
    networking.gke.io/managed-certificates: {{ include "medplum.fullname" . }}
    networking.gke.io/v1beta1.FrontendConfig: {{ include "medplum.fullname" . }}
spec:
  rules:
    - host: {{ .Values.ingress.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "medplum.fullname" . }}-service
                port:
                  number: {{ .Values.service.port | default 80 }}
{{- end }}

{{- if and (eq .Values.global.cloudProvider "azure") (eq .Values.ingress.deploy true) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "medplum.fullname" . }}
  namespace: {{ include "medplum.namespace" . }}
  labels:
    {{- include "medplum.labels" . | nindent 4 }}
spec:
  tls:
    - hosts:
      - {{ .Values.ingress.domain }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  ingressClassName: azure-application-gateway
  rules:
  - host: {{ .Values.ingress.domain }}
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: {{ include "medplum.fullname" . }}-service
            port:
              number: {{ .Values.service.port | default 80 }}

{{- end }}

{{- if and (eq .Values.global.cloudProvider "aws") (eq .Values.ingress.deploy true) }}
{{- if not .Values.ingress.albArn }}
{{ fail "ingress.albArn is required for AWS deployments. Set it to the value of `terraform output alb_arn`." }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "medplum.fullname" . }}
  namespace: {{ include "medplum.namespace" . }}
  labels:
    {{- include "medplum.labels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.acmCertificateArn | default "" | quote }}
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /healthcheck
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    {{- if .Values.ingress.albArn }}
    alb.ingress.kubernetes.io/load-balancer-arn: {{ .Values.ingress.albArn | quote }}
    {{- end }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ .Values.ingress.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "medplum.fullname" . }}-service
                port:
                  number: {{ .Values.service.port | default 80 }}
{{- end }}
